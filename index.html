<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💥 炸麥工具 - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', 'Noto Sans TC', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 50, 50, 0.3);
            padding: 1.8rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #ff4d4d, #ff8080);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .sub {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #332a55;
            padding-bottom: 0.8rem;
        }

        /* 卡片區塊 */
        .section {
            background: #1e1a2f;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            border-left: 4px solid #ff4d4d;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ff8888;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.7rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        label {
            font-weight: bold;
            color: #ddd;
            font-size: 0.9rem;
        }

        .value {
            color: #ff8888;
            font-family: monospace;
            background: #00000055;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        input[type="range"] {
            flex: 1;
            min-width: 160px;
            height: 5px;
            border-radius: 10px;
            background: #332a55;
            -webkit-appearance: none;
        }

        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff4d4d;
            cursor: pointer;
            box-shadow: 0 0 6px #ff0000;
        }

        .toggle-switch {
            width: 52px;
            height: 26px;
            background: #3a2a5a;
            border-radius: 40px;
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active { background: #ff4d4d; box-shadow: 0 0 6px #ff4d4d; }
        .toggle-switch .thumb {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active .thumb { left: 27px; }

        .url-input {
            width: 100%;
            padding: 10px;
            background: #2a2242;
            border: 1px solid #5533aa;
            color: white;
            border-radius: 40px;
            margin: 8px 0;
            font-size: 0.8rem;
        }
        .small-btn {
            background: #3a2a6a;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.1s;
        }
        .small-btn:active { transform: scale(0.96); }

        .btn-group {
            display: flex;
            gap: 15px;
            margin: 20px 0 15px;
        }
        button {
            flex: 1;
            background: #2a2242;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        button#startBtn { background: #00b894; }
        button#stopBtn { background: #d63031; }
        button:active { transform: scale(0.97); }

        .status {
            background: #0f0c1c;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-size: 0.75rem;
            font-family: monospace;
            color: #0f0;
            margin-top: 10px;
        }
        .warning {
            font-size: 0.65rem;
            color: #ffaa88;
            text-align: center;
            margin-top: 1rem;
            border-top: 1px solid #332a55;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💥 炸麥工具 · 完整版</h1>
    <div class="sub">仿 Python GUI | 爆麥 + 雜訊 + 回音 + YouTube 雙音軌</div>

    <!-- ===== 爆麥區 ===== -->
    <div class="section">
        <div class="section-title">🎤 爆麥效果</div>
        <div class="flex-row">
            <label>開關</label>
            <div id="blastToggle" class="toggle-switch active"><div class="thumb"></div></div>
        </div>
        <div class="flex-row">
            <span>增益 (0~100萬)</span>
            <span class="value" id="blastVal">900,000</span>
        </div>
        <input type="range" id="blastGain" min="0" max="1000" value="900">
    </div>

    <!-- ===== 雜訊區 ===== -->
    <div class="section">
        <div class="section-title">📢 雜訊效果</div>
        <div class="flex-row">
            <label>開關</label>
            <div id="noiseToggle" class="toggle-switch active"><div class="thumb"></div></div>
        </div>
        <div class="flex-row">
            <span>強度 (0~5000)</span>
            <span class="value" id="noiseVal">3,000</span>
        </div>
        <input type="range" id="noiseLevel" min="0" max="100" value="60">
    </div>

    <!-- ===== 回音區 ===== -->
    <div class="section">
        <div class="section-title">🔊 回音效果</div>
        <div class="flex-row">
            <label>開關</label>
            <div id="echoToggle" class="toggle-switch"><div class="thumb"></div></div>
        </div>
        <div class="flex-row">
            <span>延遲 (秒)</span>
            <span class="value" id="delayVal">0.30</span>
        </div>
        <input type="range" id="echoDelay" min="0" max="100" value="30">
        <div class="flex-row" style="margin-top: 8px;">
            <span>衰減</span>
            <span class="value" id="decayVal">0.60</span>
        </div>
        <input type="range" id="echoDecay" min="0" max="100" value="60">
    </div>

    <!-- ===== 主音樂區 (YouTube) ===== -->
    <div class="section">
        <div class="section-title">🎵 主音樂</div>
        <div class="flex-row">
            <label>網址</label>
            <input type="text" id="musicUrl" class="url-input" placeholder="貼上 YouTube 網址...">
            <button class="small-btn" id="loadMusicBtn">載入</button>
        </div>
        <div class="flex-row">
            <span>音量</span>
            <span class="value" id="musicVolVal">0.70</span>
        </div>
        <input type="range" id="musicVolume" min="0" max="200" value="70">
        <div class="flex-row">
            <label>🔁 循環播放</label>
            <div id="loopToggle" class="toggle-switch active"><div class="thumb"></div></div>
        </div>
    </div>

    <!-- ===== 八環奏樂區 (第二首音樂) ===== -->
    <div class="section">
        <div class="section-title">🎵 八環奏樂 (第二首疊加)</div>
        <div class="flex-row">
            <label>網址</label>
            <input type="text" id="octaveUrl" class="url-input" placeholder="貼上 YouTube 網址...">
            <button class="small-btn" id="loadOctaveBtn">載入</button>
        </div>
        <div class="flex-row">
            <span>音量</span>
            <span class="value" id="octaveVolVal">0.50</span>
        </div>
        <input type="range" id="octaveVolume" min="0" max="200" value="50">
    </div>

    <!-- 控制按鈕 -->
    <div class="btn-group">
        <button id="startBtn">▶ 啟動炸麥</button>
        <button id="stopBtn">⏹ 停止炸麥</button>
    </div>

    <div class="status" id="statusText">⚫ 未啟動</div>
    <div class="warning">
        ⚠️ 請先調低喇叭音量！第一次使用需允許麥克風權限。<br>
        🎧 麥克風即時炸裂 + YouTube 音樂背景疊加，完整如 Python 版。
    </div>
</div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const blastToggle = document.getElementById('blastToggle');
        const noiseToggle = document.getElementById('noiseToggle');
        const echoToggle = document.getElementById('echoToggle');
        const loopToggle = document.getElementById('loopToggle');
        const blastSlider = document.getElementById('blastGain');
        const noiseSlider = document.getElementById('noiseLevel');
        const delaySlider = document.getElementById('echoDelay');
        const decaySlider = document.getElementById('echoDecay');
        const musicSlider = document.getElementById('musicVolume');
        const octaveSlider = document.getElementById('octaveVolume');
        const blastVal = document.getElementById('blastVal');
        const noiseVal = document.getElementById('noiseVal');
        const delayVal = document.getElementById('delayVal');
        const decayVal = document.getElementById('decayVal');
        const musicVolVal = document.getElementById('musicVolVal');
        const octaveVolVal = document.getElementById('octaveVolVal');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('statusText');
        const musicUrlInput = document.getElementById('musicUrl');
        const octaveUrlInput = document.getElementById('octaveUrl');
        const loadMusicBtn = document.getElementById('loadMusicBtn');
        const loadOctaveBtn = document.getElementById('loadOctaveBtn');

        // ---------- 參數 ----------
        let blastEnabled = true;
        let noiseEnabled = true;
        let echoEnabled = false;
        let loopEnabled = true;
        let blastGainLinear = 900000;
        let noiseLinear = 3000;
        let echoDelaySec = 0.30;
        let echoDecayVal = 0.60;
        let musicVolume = 0.70;
        let octaveVolume = 0.50;

        // Web Audio 相關
        let audioContext = null;
        let mediaStream = null;
        let sourceNode = null;
        let gainNode = null;          // 爆麥
        let delayNode = null;
        let feedbackGain = null;
        let noiseWorkletNode = null;
        let musicSource = null;
        let musicGain = null;
        let octaveSource = null;
        let octaveGain = null;
        let isRunning = false;

        // YouTube 相關
        let currentMusicNode = null;
        let currentOctaveNode = null;

        // ---------- UI 更新 ----------
        function updateUI() {
            blastVal.innerText = Math.round(blastGainLinear).toLocaleString();
            noiseVal.innerText = Math.round(noiseLinear);
            delayVal.innerText = echoDelaySec.toFixed(2);
            decayVal.innerText = echoDecayVal.toFixed(2);
            musicVolVal.innerText = musicVolume.toFixed(2);
            octaveVolVal.innerText = octaveVolume.toFixed(2);
        }

        blastSlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            blastGainLinear = (p/1000) * 1000000;
            updateUI();
            if(gainNode && isRunning) gainNode.gain.value = blastEnabled ? blastGainLinear : 1;
        });
        noiseSlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            noiseLinear = (p/100) * 5000;
            updateUI();
        });
        delaySlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            echoDelaySec = (p/100) * 1.0;
            updateUI();
            if(delayNode && isRunning) delayNode.delayTime.value = echoDelaySec;
        });
        decaySlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            echoDecayVal = p/100;
            updateUI();
            if(feedbackGain && isRunning) feedbackGain.gain.value = echoDecayVal;
        });
        musicSlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            musicVolume = p/100;
            updateUI();
            if(musicGain && isRunning) musicGain.gain.value = musicVolume;
        });
        octaveSlider.addEventListener('input', (e) => {
            let p = parseInt(e.target.value,10);
            octaveVolume = p/100;
            updateUI();
            if(octaveGain && isRunning) octaveGain.gain.value = octaveVolume;
        });

        function setupToggle(toggle, defaultValue, onChange) {
            if(defaultValue) toggle.classList.add('active');
            else toggle.classList.remove('active');
            toggle.addEventListener('click', () => {
                const newState = !toggle.classList.contains('active');
                if(newState) toggle.classList.add('active');
                else toggle.classList.remove('active');
                onChange(newState);
            });
        }
        setupToggle(blastToggle, blastEnabled, (v) => { blastEnabled=v; if(gainNode && isRunning) gainNode.gain.value = blastEnabled? blastGainLinear:1; });
        setupToggle(noiseToggle, noiseEnabled, (v) => { noiseEnabled=v; updateNoiseVolume(); });
        setupToggle(echoToggle, echoEnabled, (v) => { echoEnabled=v; if(isRunning) reconnectEffects(); });
        setupToggle(loopToggle, loopEnabled, (v) => { loopEnabled=v; });

        function reconnectEffects() {
            if(!audioContext || !sourceNode || !gainNode) return;
            sourceNode.disconnect();
            gainNode.disconnect();
            if(delayNode) delayNode.disconnect();
            if(feedbackGain) feedbackGain.disconnect();
            sourceNode.connect(gainNode);
            if(echoEnabled && delayNode && feedbackGain) {
                gainNode.connect(delayNode);
                delayNode.connect(feedbackGain);
                feedbackGain.connect(delayNode);
                delayNode.connect(audioContext.destination);
            } else {
                gainNode.connect(audioContext.destination);
            }
        }

        // 建立雜訊 Worklet
        async function createNoiseNode(ctx) {
            const code = `
                class NoiseProcessor extends AudioWorkletProcessor {
                    process(inputs, outputs) {
                        const out = outputs[0];
                        for(let c=0; c<out.length; c++) {
                            const ch = out[c];
                            for(let i=0; i<ch.length; i++) ch[i] = (Math.random()*2-1)*0.8;
                        }
                        return true;
                    }
                }
                registerProcessor('noise-processor', NoiseProcessor);
            `;
            const blob = new Blob([code], {type:'application/javascript'});
            const url = URL.createObjectURL(blob);
            await ctx.audioWorklet.addModule(url);
            URL.revokeObjectURL(url);
            const node = new AudioWorkletNode(ctx, 'noise-processor');
            const gain = ctx.createGain();
            node.connect(gain);
            return {node, gain};
        }

        function updateNoiseVolume() {
            if(!noiseWorkletNode) return;
            const target = noiseEnabled ? (noiseLinear / 32768) * 0.8 : 0;
            noiseWorkletNode.gain.gain.value = Math.min(0.9, target);
        }

        // 播放 YouTube (透過 yt-dlp 代理或直接使用 Audio 元素) —— 這裡用最簡單的 Audio 元素 + CORS 代理
        function loadYouTubeAudio(url, volume, callback) {
            // 使用 free-youtube 代理取得音訊串流（簡單方案）
            const proxyUrl = `https://www.yt-dlp.org/audio?url=${encodeURIComponent(url)}`;
            const audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.src = proxyUrl;
            audio.loop = loopEnabled;
            audio.volume = volume;
            audio.oncanplaythrough = () => {
                if(callback) callback(audio);
            };
            audio.load();
            return audio;
        }

        loadMusicBtn.addEventListener('click', () => {
            const url = musicUrlInput.value.trim();
            if(!url) { statusDiv.innerText = "請輸入主音樂網址"; return; }
            if(musicSource) { musicSource.pause(); musicSource = null; }
            musicSource = loadYouTubeAudio(url, musicVolume, (audioElem) => {
                if(isRunning && audioContext) {
                    const src = audioContext.createMediaElementSource(audioElem);
                    const gain = audioContext.createGain();
                    gain.gain.value = musicVolume;
                    src.connect(gain);
                    gain.connect(audioContext.destination);
                    if(musicGain) musicGain.disconnect();
                    musicGain = gain;
                    audioElem.play();
                } else {
                    audioElem.play();
                }
                statusDiv.innerText = "主音樂載入中...";
            });
        });

        loadOctaveBtn.addEventListener('click', () => {
            const url = octaveUrlInput.value.trim();
            if(!url) { statusDiv.innerText = "請輸入八環奏樂網址"; return; }
            if(currentOctaveNode) { currentOctaveNode.pause(); currentOctaveNode = null; }
            currentOctaveNode = loadYouTubeAudio(url, octaveVolume, (audioElem) => {
                if(isRunning && audioContext) {
                    const src = audioContext.createMediaElementSource(audioElem);
                    const gain = audioContext.createGain();
                    gain.gain.value = octaveVolume;
                    src.connect(gain);
                    gain.connect(audioContext.destination);
                    if(octaveGain) octaveGain.disconnect();
                    octaveGain = gain;
                    audioElem.play();
                } else {
                    audioElem.play();
                }
                statusDiv.innerText = "八環奏樂載入中...";
            });
        });

        // 啟動炸麥
        async function startBlasting() {
            if(isRunning) await stopBlasting();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await audioContext.resume();
                sourceNode = audioContext.createMediaStreamSource(stream);
                gainNode = audioContext.createGain();
                gainNode.gain.value = blastEnabled ? blastGainLinear : 1;
                delayNode = audioContext.createDelay();
                delayNode.delayTime.value = echoDelaySec;
                feedbackGain = audioContext.createGain();
                feedbackGain.gain.value = echoDecayVal;

                const noiseObj = await createNoiseNode(audioContext);
                noiseWorkletNode = noiseObj;
                noiseWorkletNode.gain.gain.value = 0;
                noiseWorkletNode.node.connect(audioContext.destination);
                updateNoiseVolume();

                sourceNode.connect(gainNode);
                if(echoEnabled) {
                    gainNode.connect(delayNode);
                    delayNode.connect(feedbackGain);
                    feedbackGain.connect(delayNode);
                    delayNode.connect(audioContext.destination);
                } else {
                    gainNode.connect(audioContext.destination);
                }

                isRunning = true;
                statusDiv.innerText = "💥 炸麥進行中 (麥克風已炸裂)";
                statusDiv.style.color = "#ff5555";
            } catch(e) {
                statusDiv.innerText = "❌ 麥克風錯誤: " + e.message;
            }
        }

        async function stopBlasting() {
            isRunning = false;
            if(audioContext) await audioContext.close();
            if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
            audioContext = null;
            sourceNode = null;
            gainNode = null;
            delayNode = null;
            feedbackGain = null;
            noiseWorkletNode = null;
            statusDiv.innerText = "⚫ 已停止";
            statusDiv.style.color = "#0f0";
        }

        startBtn.addEventListener('click', startBlasting);
        stopBtn.addEventListener('click', stopBlasting);
        updateUI();
    })();
</script>
</body>
</html>
